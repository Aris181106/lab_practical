<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DOM Basics</title>
</head>
<body>
    <h1 id="title">Xin chào DOM!</h1>
    <p class="description">Đây là đoạn văn đầu tiên</p>
    <p class="description">Đây là đoạn văn thứ hai</p>
    <ul id="danh-sach">
        <li class="item">HTML</li>
        <li class="item">CSS</li>
        <li class="item">JavaScript</li>
    </ul>
    
    <script>
        document.getElementById('title').textContent = "Nguyen Viet Tien";
        document.querySelector('.description').textContent = "Toi dang hoc Dom";
        document.querySelector('.item').innerHTML = "<strong>HTML5</strong>";
        document.querySelectorAll('.item').forEach(function(item){
            item.textContent += " da hoc";
        });
        document.querySelectorAll('.item').forEach(function(item){
            item.className += " highlight";
        });
        document.querySelectorAll('.item').forEach(function(item, index){
            item.setAttribute("data-index", index);
        });
        document.getElementById('title').textContent = "DOM Practice";
        document.querySelectorAll('.item')[1].classList.toggle('text-red');
        document.querySelectorAll('.item').forEach(function(item){
            item.classList.remove('highlight');
        })
        document.querySelectorAll('.item').forEach(function(item){
        if(item.getAttribute('data-index') % 2 == 0){
            item.style.backgroundColor = '#dbeafe';
            }
        else{
            item.style.backgroundColor = '#fce7f3';
        }
        });
        document.querySelectorAll('.item').forEach(function(item){
            if(item.getAttribute('data-index') == 0){
                item.style.fontSize = ((0 + 1) * 14 ) + 'px';
            }
            else if(item.getAttribute('data-index') == 1){
                item.style.fontSize = ((1 + 1) * 14 ) + 'px';
            }
            else if(item.getAttribute('data-index') == 2){
                item.style.fontSize = ((2 + 1) * 14 ) + 'px';
            }
        });
        console.log("Document:", document);
        console.log("Title:", document.title);
        console.log("Body:", document.body);
    </script>
</body>
</html>
